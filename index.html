<!doctype html>
<html>
  <head>
    <title>Math Client</title>
  </head>
  <body>
    <h2>Fibonacci</h2>

    <input type="number" id="numFactors" />
    <button onclick="callFactor()">Calcular factores</button>

    <p id="resultFactors"></p>

    <input type="number" id="numPrimes" />
    <button onclick="callPrimes()">Calcular primos</button>

    <p id="resultPrimes"></p>

    <script>
      function callFactor() {
        let n = document.getElementById("numFactors").value;

        fetch("http://ec2-18-205-247-83.compute-1.amazonaws.com:8080/factors?n=" + n)
          .then((res) => res.text())
          .then((data) => {
            document.getElementById("resultFactors").innerText = data;
          })
          .catch((error) => {
            document.getElementById("resultFactors").innerText =
              "Error: " + error.message;
          });
      }

      function callPrimes() {
        let n = document.getElementById("numPrimes").value;

        fetch("http://ec2-18-205-247-83.compute-1.amazonaws.com:8080/primes?n=" + n)
          .then((res) => res.text())
          .then((data) => {
            document.getElementById("resultPrimes").innerText = data;
          })
          .catch((error) => {
            document.getElementById("resultPrimes").innerText =
              "Error: " + error.message;
          });
      }
    </script>
  </body>
</html>
